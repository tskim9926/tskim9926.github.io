# Setup
title: TasSeung Dev log
description: I hope we can grow together.
url: https://tskim9926.github.io
avatar: /avatar.jpeg
paginate: 5
permalink: pretty
cover_image: /bg.jpeg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: Taeseung Kim
  card: summary
logo: logo.png
social:
  name: Taeseung Kim
  links:
    - https://tskim9926.github.io
    - https://github.com/tskim9926
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Taeseung Kim
  url: https://github.com/tskim9926
  email: tskim9926@gmail.com
  bio: |
    Taeseung Kim, a Software Engineer specializing in semiconductor manufacturing. 
    Since August 2020, I have been developing systems and equipment that control lasers and scanners 
    based on recipe data to shape patterns on wafers.
    I graduated with a Bachelor's degree in Electronic Engineering from Korea Polytechnic University.
